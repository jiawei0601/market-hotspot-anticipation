        h2 {

        p {

        table {

            border: 1px solid var(--table-border);

        th, td {

        tr:last-child td {

            border-left: 4px solid var(--primary-cyan);
            padding: 16px 20px;

        blockquote p {
            margin: 0;
            color: #93c5fd;
            font-style: italic;
        }
        /* 程式碼與公式 */
        pre {

            padding: 18px;
            border-radius: 12px;
            overflow-x: auto;
            border: 1px solid var(--border-color);
        }
        code {
            font-family: 'Fira Code', 'Courier New', monospace;
            background: rgba(255, 255, 255, 0.07);

            border-radius: 6px;

        a {

    <script>

        const path = window.location.pathname;
        if (path.endsWith('performance.html')) {
            document.getElementById('nav-perf').classList.add('active');
        } else {
            document.getElementById('nav-rep').classList.add('active');
        }
        
        // 讀取 Raw Markdown 字串並使用 marked 渲染
        const rawMarkdown = `# 系統長期績效與勝率評估報告

## 三、 長期績效評估方法論說明
1. **進場基準判定**：當系統透過 LangGraph 品質評審 (PASS) 輸出報告時，會同步呼叫營收基期與設備 Backlog 模擬器。若篩選出「共識度低於 60% 且設備 Backlog YoY > 50%、下游營收在谷底」的非共識黃金建倉標的，即以**報告產生當日的收盤價**作為推薦基準買入價，並於本名單中開立追蹤。
2. **K 線追蹤防看前偏差**：系統每天利用 yfinance 自動拉取追蹤標的之每日日 K 線數據，動態刷新「推薦日之後的最高價與最低價」，排除任何歷史 look-ahead bias。
3. **退場與勝率計算**：勝率專注於中期（12-18個月）的「波段最大漲幅能否達標 (\$15\\%\$)」，作為系統能否精確領先市場預見熱點的勝率證明。
`;
