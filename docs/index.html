<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>最新市場熱點預見報告</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --text-color: #f1f5f9;
            --primary-cyan: #38bdf8;
            --accent-green: #10b981;
            --accent-orange: #f59e0b;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --table-border: rgba(255, 255, 255, 0.06);
        }
        body {
            font-family: 'Inter', 'Noto Sans TC', -apple-system, sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-color);
            margin: 0;
            padding: 0;
            line-height: 1.7;
        }
        .header {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid var(--border-color);
            padding: 16px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo {
            font-family: 'Outfit', sans-serif;
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--primary-cyan);
            letter-spacing: 1px;
            display: flex;
            align-items: center;
        }
        .logo span {
            color: #fff;
            margin-left: 6px;
        }
        .nav-links a {
            color: #94a3b8;
            text-decoration: none;
            margin-left: 20px;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s;
        }
        .nav-links a:hover, .nav-links a.active {
            color: var(--primary-cyan);
        }
        .container {
            max-width: 960px;
            margin: 40px auto;
            padding: 40px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }
        /* Markdown 內容精細排版 */
        h1, h2, h3, h4 {
            font-family: 'Outfit', 'Noto Sans TC', sans-serif;
            font-weight: 700;
            color: #ffffff;
            margin-top: 1.8em;
            margin-bottom: 0.6em;
        }
        h1 {
            font-size: 2.2rem;
            color: var(--primary-cyan);
            border-bottom: 2px solid rgba(56, 189, 248, 0.2);
            padding-bottom: 12px;
            margin-top: 0;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        h2 {
            font-size: 1.6rem;
            border-left: 5px solid var(--accent-green);
            padding-left: 14px;
        }
        h3 {
            font-size: 1.25rem;
            color: #e2e8f0;
        }
        p {
            color: #cbd5e1;
            margin-bottom: 1.5em;
        }
        /* 表格現代化樣式 */
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 28px 0;
            background: rgba(15, 23, 42, 0.4);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--table-border);
        }
        th, td {
            padding: 14px 18px;
            text-align: left;
            border-bottom: 1px solid var(--table-border);
            font-size: 0.95rem;
        }
        th {
            background-color: rgba(56, 189, 248, 0.08);
            color: var(--primary-cyan);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }
        tr:last-child td {
            border-bottom: none;
        }
        tr:hover td {
            background: rgba(255, 255, 255, 0.01);
        }
        /* 區塊引用與警示 */
        blockquote {
            background: rgba(56, 189, 248, 0.05);
            border-left: 4px solid var(--primary-cyan);
            padding: 16px 20px;
            margin: 20px 0;
            border-radius: 0 12px 12px 0;
        }
        blockquote p {
            margin: 0;
            color: #93c5fd;
            font-style: italic;
        }
        /* 程式碼與公式 */
        pre {
            background: #0f172a;
            padding: 18px;
            border-radius: 12px;
            overflow-x: auto;
            border: 1px solid var(--border-color);
        }
        code {
            font-family: 'Fira Code', 'Courier New', monospace;
            background: rgba(255, 255, 255, 0.07);
            padding: 3px 7px;
            border-radius: 6px;
            color: #f472b6;
            font-size: 0.9rem;
        }
        pre code {
            background: none;
            padding: 0;
            color: #e2e8f0;
        }
        hr {
            border: none;
            border-top: 1px solid var(--border-color);
            margin: 40px 0;
        }
        a {
            color: var(--primary-cyan);
            text-decoration: none;
            transition: opacity 0.2s;
        }
        a:hover {
            opacity: 0.8;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">ANTIGRAVITY<span>RESEARCH</span></div>
        <div class="nav-links">
            <a href="index.html" id="nav-rep">每週熱點報告</a>
            <a href="performance.html" id="nav-perf">系統績效評估</a>
        </div>
    </div>
    <div class="container" id="content">正在渲染報告內容，請稍候...</div>
    <script>
        // 設定導航欄 active 樣式 (針對靜態 Pages 最佳化)
        const path = window.location.pathname;
        if (path.endsWith('performance.html')) {
            document.getElementById('nav-perf').classList.add('active');
        } else {
            document.getElementById('nav-rep').classList.add('active');
        }
        
        // 讀取 Raw Markdown 字串並使用 marked 渲染
        const rawMarkdown = `# 18-24 個月超前市場熱點預見報告：CPO_Optical_Transceiver 技術板塊

## 一、 技術物理限制與超前 18-24 個月 (Feynman_Next) 洗牌框架
當市場仍熱烈討論 Feynman 世代的量產放量時，頂尖投資人必須將能見度拉長至 18-24 個月後的 Feynman_Next 世代。在此超前世代中，傳統物理極限再次被打破：
1. **去模組化風險**：光學相干傳輸 (CPO) 模組將直接整合入計算晶粒主體 (Silicon Photonics Integrated I/O)，導致獨立 CPO 模組市場萎縮。
2. **極限散熱轉移**：散熱從傳統水冷進化為晶片內直接水冷 (DTC) 整合設計。

## 二、 供應鏈內容價值 (Content Value) 正反面推演與下世代替代風險警告
本研究針對下世代物理變更，進行了內容價值變動率 (\$\\Delta\$CV) 的正反面推演：
- **反面警告 (替代歸零風險)**：
  - **FOCI (3450.TW - 聯鈞)**：在 Feynman 世代內容價值達 14.0%，但至 Feynman_Next 世代因去模組化，內容價值腰斬至 8.0% (衰退 -42.86%)。股價已反映 Rubin/Feynman 利多，下世代面臨淘汰風險，強烈建議不宜追高。
  - **MCT (3013.TW - 晟銘電)**：內容價值由 9.5% 下滑至 4.0% (衰退 -57.89%)，受制於傳統機箱被 DTC 直接液冷整合替代。
- **正面轉機 (新進入與價值擴張者)**：
  - **GrandProcess (3131.TW - 弘塑)**：Feynman_Next 3D 封裝濕製程複雜度暴增，內容價值由 18.0% 暴增至 26.0% (增長 44.44%)。
  - **Auras (3324.TW - 雙鴻)**：掌握下一代 DTC 液冷核心專利，內容價值由 12.0% 攀升至 18.0% (增長 50.0%)。

## 三、 領先 6-9 個月之設備 Backlog 訂單與營收基期定量預測
1. **上游設備訂單領先性**：下游成品營收是落後指標，而上游先進封裝設備 Backlog 訂單領先下游成品營收 2 個季度 (6個月) 爆發。
2. **定量預估**：
  - 弘塑 (3131.TW)：目前成品營收 YoY 僅為 11.20%，但其設備訂單 Backlog YoY 已經飆升至 **84.50%**，確認處於極強拉貨期，此為最領先的起漲訊號。
  - 雙鴻 (3324.TW)：目前成品營收 YoY 為 8.90%，但設備與 DTC 專案 Backlog YoY 達 **52.40%**，預期在 6 個月後下游營收將迎來 YoY 爆增。

## 四、 預期差與共識度 (Consensus Score) 過濾操作策略
系統利用「共識度得分」進行預期差過濾，以防買入「已反映」之熱門共識標的：
- **共識已反映標的**：聯鈞 (Consensus: 92.0)、晟銘電 (Consensus: 85.0)。已被散戶與媒體廣泛報導，股價透支。
- **非共識潛伏標的**：弘塑 (Consensus: 35.0)、雙鴻 (Consensus: 52.0)。市場關注度低，預期差極大，且設備訂單已率先爆發，為黃金建倉窗口。

## 五、 結論與非共識 (Non-Consensus) 投資建議
1. **操作策略**：強烈建議避開已大幅反映且下下一代面臨替代風險的 FOCI 與 MCT。
2. **核心配置**：逢低悄悄潛伏低共識度、設備 Backlog 暴增、成品營收在谷底的 GrandProcess (3131.TW) 與 Auras (3324.TW)。在未來 3 個月媒體以先進封裝設備出貨高峰為頭條大肆宣傳、散戶興奮時，執行獲利了結。
`;
        document.getElementById('content').innerHTML = marked.parse(rawMarkdown);

        // 動態渲染 ApexCharts K 線圖
        const watchlistData = [];
        if (watchlistData && watchlistData.length > 0) {
            watchlistData.forEach(item => {
                const cleanId = 'chart_' + item.company_id.replace('.', '_');
                const container = document.getElementById(cleanId);
                if (container && item.kline_data && item.kline_data.length > 0) {
                    const entryTime = new Date(item.entry_date).getTime();
                    
                    const options = {
                        series: [{
                            name: '收盤價',
                            data: item.kline_data.map(k => [new Date(k.date).getTime(), k.close])
                        }],
                        chart: {
                            type: 'area',
                            height: 240,
                            background: 'transparent',
                            toolbar: { show: false },
                            foreColor: '#94a3b8'
                        },
                        colors: ['#38bdf8'],
                        fill: {
                            type: 'gradient',
                            gradient: {
                                shadeIntensity: 1,
                                opacityFrom: 0.3,
                                opacityTo: 0.05,
                                stops: [0, 90, 100]
                            }
                        },
                        stroke: { curve: 'smooth', width: 2 },
                        xaxis: {
                            type: 'datetime',
                            axisBorder: { show: false },
                            axisTicks: { show: false }
                        },
                        yaxis: {
                            labels: {
                                formatter: (val) => val.toFixed(1)
                            }
                        },
                        grid: { borderColor: 'rgba(255,255,255,0.04)' },
                        annotations: {
                            xaxis: [{
                                x: entryTime,
                                strokeDashArray: 4,
                                borderColor: '#10b981',
                                label: {
                                    borderColor: '#10b981',
                                    style: { color: '#fff', background: '#10b981', fontSize: '11px', padding: [3, 6] },
                                    text: '列入觀察 (' + item.entry_date + ')'
                                }
                            }],
                            points: [{
                                x: entryTime,
                                y: item.entry_price,
                                marker: {
                                    size: 6,
                                    fillColor: '#10b981',
                                    strokeColor: '#fff',
                                    radius: 2
                                },
                                label: {
                                    borderColor: '#10b981',
                                    offsetY: -10,
                                    style: { color: '#fff', background: '#10b981', fontSize: '11px', padding: [3, 6] },
                                    text: '進場點: ' + item.entry_price
                                }
                            }]
                        },
                        tooltip: {
                            theme: 'dark',
                            x: { format: 'yyyy-MM-dd' }
                        }
                    };
                    const chart = new ApexCharts(container, options);
                    chart.render();
                }
            });
        }
    </script>
</body>
</html>
